<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste</title>
<style>
body { background: #0d0f14; color: #e8eaf0; font-family: sans-serif; padding: 2rem; }
button { padding: 10px 20px; margin: 5px; cursor: pointer; border-radius: 8px; border: none; font-size: 14px; }
#resultado { margin-top: 1rem; padding: 1rem; background: #1a1e2a; border-radius: 8px; font-size: 13px; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>🔧 Diagnóstico</h2>

<h3>Teste 1 — Temas</h3>
<button onclick="setTema('azul')" style="background:#5b8dee;color:white">Azul</button>
<button onclick="setTema('verde')" style="background:#3ecf8e;color:white">Verde</button>
<button onclick="setTema('roxo')" style="background:#a78bfa;color:white">Roxo</button>
<button onclick="setTema('claro')" style="background:#eef1f8;color:#333">Claro</button>
<button onclick="setTema('ember')" style="background:#f6ad55;color:white">Ember</button>
<p id="tema-status">Clique num tema</p>

<h3>Teste 2 — Firebase</h3>
<button onclick="testarFirebase()">🔥 Testar conexão Firebase</button>
<div id="resultado">Aguardando...</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const CORES = {
  azul:  {bg:'#0d0f14', text:'#e8eaf0'},
  verde: {bg:'#0a0f0d', text:'#e0ede6'},
  roxo:  {bg:'#0e0b18', text:'#ede8f5'},
  claro: {bg:'#f4f6fb', text:'#1a1f2e'},
  ember: {bg:'#110d08', text:'#f0e6d8'},
};

function setTema(nome) {
  const c = CORES[nome];
  document.body.style.background = c.bg;
  document.body.style.color = c.text;
  document.getElementById('tema-status').textContent = '✅ Tema ' + nome + ' — bg=' + c.bg;
}

firebase.initializeApp({
  apiKey: "AIzaSyAd9qMhJC-AiouJFTAc0kjWBIde4jSulRc",
  authDomain: "finan-398e7.firebaseapp.com",
  projectId: "finan-398e7",
  storageBucket: "finan-398e7.firebasestorage.app",
  messagingSenderId: "430455819431",
  appId: "1:430455819431:web:23c898373bc7629ce51f82"
});
const db = firebase.firestore();

async function testarFirebase() {
  const el = document.getElementById('resultado');
  el.textContent = 'Conectando...';
  try {
    const snap = await db.collection('financas').doc('marcelo').get();
    if (snap.exists) {
      el.textContent = '✅ FIRESTORE OK! Chaves: ' + JSON.stringify(Object.keys(snap.data()));
    } else {
      el.textContent = '⚠️ Conectou mas sem dados ainda';
    }
  } catch(e) {
    el.textContent = '❌ ERRO: ' + e.code + ' — ' + e.message;
  }
}
</script>
</body>
</html>
